name: Update Forge Update JSON

# Fires when CHANGELOG.md is pushed to main.
# The Python script will only update update.json if the topmost changelog entry
# has a date (## [X.Y.Z] - YYYY-MM-DD), signalling a finalized release.
# Entries without a date (## [X.Y.Z] - ) are treated as WIP and skipped.
on:
  push:
    branches: [master]
    paths: ['CHANGELOG.md']

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run update script
        id: update
        run: python3 scripts/update_forge_json.py

      - name: Commit update.json if changed
        run: |
          if git diff --quiet update.json; then
            echo "update.json unchanged, nothing to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add update.json
            git commit -m "chore: update forge update.json for ${{ env.RELEASE_VERSION }}"
            git push origin master
          fi
